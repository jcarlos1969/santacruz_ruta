<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rutas A↔B SCZ Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --r1:#00e5ff; --r2:#ff6b35; --au:#a78bfa;
    --alert-ab:#facc15; --alert-ba:#f472b6;
    --bg:#0a0a12; --panel:#13131f; --border:#2a2a3e;
    --text:#e8e8f0; --muted:#6b6b8a;
  }
  
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  
  body { 
    font-family:'Space Mono', monospace; 
    background:var(--bg); color:var(--text); 
    height:100vh; display:flex; flex-direction:column; overflow:hidden; 
  }

  header {
    display:flex; flex-direction: column; padding: 10px;
    background:var(--panel); border-bottom:1px solid var(--border); z-index: 1001;
  }
  
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .logo { font-family:'Syne', sans-serif; font-size:1rem; font-weight:800; }
  
  .role-display {
    font-size: 0.65rem; padding: 4px 8px; border-radius: 6px; 
    background: var(--border); color: var(--muted); border: 1px solid transparent;
  }
  .role-display.active { border-color: var(--au); color: var(--au); font-weight: bold; }

  .controls {
    display:flex; gap:8px; overflow-x: auto; padding-bottom: 4px;
    scrollbar-width: none;
  }
  .controls::-webkit-scrollbar { display: none; }

  .btn {
    font-family:'Space Mono', monospace; font-size:0.7rem; font-weight:700;
    padding:10px 14px; border:1.5px solid var(--border);
    background:rgba(255,255,255,0.03); color:var(--muted);
    border-radius:10px; cursor:pointer; white-space:nowrap;
  }
  
  .btn.active-btn { border-color: var(--text); color: var(--text); background: rgba(255,255,255,0.1); }
  .btn.ar1 { border-color:var(--r1); color:var(--r1); }
  .btn.ar2 { border-color:var(--r2); color:var(--r2); }
  .btn.aau { border-color:var(--au); color:var(--au); }
  .btn.danger { border-color:#ef4444; color:#ef4444; }

  #map { flex:1; width:100%; z-index: 1; }

  .bottom-panel {
    position:absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    width: 92%; max-width: 450px; background:rgba(19, 19, 31, 0.95);
    backdrop-filter: blur(10px); border:1px solid var(--border);
    border-radius:16px; padding:15px; z-index:1000;
  }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.75rem; margin-bottom: 12px; }
  .stat-item { display: flex; align-items: center; gap: 8px; }
  .dot { width:10px; height:10px; border-radius:50%; }

  .alert-overlay {
    position:absolute; inset:0; background:rgba(10, 10, 18, 0.98);
    z-index:2000; display:none; flex-direction: column;
    align-items:center; justify-content: center; padding:25px; text-align: center;
  }
  .alert-overlay.show { display:flex; }

  .toast { 
    position:fixed; bottom:140px; left:50%; transform:translateX(-50%); 
    background:var(--r1); color:#000; padding:10px 20px; 
    border-radius:12px; font-weight:bold; font-size:0.75rem; 
    z-index:9999; opacity:0; transition:0.3s; pointer-events:none;
  }
  .toast.show { opacity:1; }

  /* Marcador de usuario animado */
  .user-pos {
    width: 12px; height: 12px; background: var(--au);
    border: 2px solid #fff; border-radius: 50%;
    box-shadow: 0 0 15px var(--au);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(167, 139, 250, 0.7); }
    70% { transform: scale(1.2); box-shadow: 0 0 0 10px rgba(167, 139, 250, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(167, 139, 250, 0); }
  }
</style>
</head>
<body>

<header>
  <div class="top-bar">
    <div class="logo"><span style="color:var(--r1)">A</span>↔<span style="color:var(--r2)">B</span> SCZ</div>
    <div id="roleLabel" class="role-display">MODO: ESPERA</div>
    <button class="btn aau" id="gpsBtn" onclick="toggleGPS()">📍 GPS: OFF</button>
  </div>
  <div class="controls">
    <button class="btn" id="modeDriver" onclick="setUserRole('driver')">🚗 CONDUCTOR</button>
    <button class="btn" id="modeRider" onclick="setUserRole('rider')">🚶 PASAJERO</button>
    <div style="width:1px; background:var(--border); margin:0 4px;"></div>
    <button class="btn" id="btnR1" onclick="setRoute('r1')">🔵 A→B</button>
    <button class="btn" id="btnR2" onclick="setRoute('r2')">🟠 B→A</button>
    <button class="btn" onclick="openModal()">💾 DATOS</button>
  </div>
</header>

<div id="map"></div>

<div class="bottom-panel">
  <div class="stats-grid">
    <div class="stat-item"><div class="dot" style="background:var(--r1)"></div> A: <b id="dA">-</b></div>
    <div class="stat-item"><div class="dot" style="background:var(--r2)"></div> B: <b id="dB">-</b></div>
    <div class="stat-item"><div class="dot" style="background:var(--alert-ab)"></div> ⚠️ A→B: <b id="cAB">0</b></div>
    <div class="stat-item"><div class="dot" style="background:var(--alert-ba)"></div> ⚠️ B→A: <b id="cBA">0</b></div>
  </div>
  <button class="btn aau" onclick="startAlertMode()" style="width:100%">REPORTAR ALERTA EN RUTA</button>
</div>

<div class="alert-overlay" id="alertOverlay">
  <h2 style="color:var(--alert-ab); margin-bottom:10px">NUEVO REPORTE</h2>
  <p style="font-size:0.8rem; margin-bottom:20px">Selecciona el sentido y toca el mapa</p>
  <div style="display:flex; gap:12px; margin-bottom:30px">
    <button class="btn ar1" id="selAB" onclick="setAlertDir('AB')">SENTIDO A→B</button>
    <button class="btn ar2" id="selBA" onclick="setAlertDir('BA')">SENTIDO B→A</button>
  </div>
  <button class="btn danger" onclick="closeAlertMode()" style="width:180px">CANCELAR</button>
</div>

<div id="modalOverlay" class="alert-overlay" style="background:rgba(10,10,18,0.9)">
  <div style="background:var(--panel); padding:25px; border-radius:20px; border:1px solid var(--border); width:280px">
    <h3 style="margin-bottom:15px">GESTIÓN</h3>
    <button class="btn" onclick="downloadAlerts()" style="width:100%; margin-bottom:10px">📥 DESCARGAR JSON</button>
    <button class="btn" onclick="document.getElementById('fileInput').click()" style="width:100%; margin-bottom:10px">📤 CARGAR JSON</button>
    <button class="btn danger" onclick="clearMap()" style="width:100%; margin-bottom:15px">🗑️ BORRAR TODO</button>
    <button class="btn" onclick="closeModal()" style="width:100%">CERRAR</button>
    <input type="file" id="fileInput" style="display:none" onchange="importData(event)">
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const PTA = [-17.7086389, -63.11375];
const PTB = [-17.762287,  -63.158758];

const map = L.map('map', { zoomControl: false }).setView([-17.735, -63.136], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let userMarker, gpsActive = false, currentRole = null;
let routePoly, alerts = [], alertActive = false, selectedDir = null;

// --- GPS Y UBICACIÓN ---
function toggleGPS() {
  const btn = document.getElementById('gpsBtn');
  if (!gpsActive) {
    if (!navigator.geolocation) return showToast("GPS no soportado");
    gpsActive = true;
    btn.innerText = "📍 GPS: ON";
    btn.classList.add('active-btn');
    map.locate({ watch: true, enableHighAccuracy: true });
    showToast("Localizando...");
  } else {
    gpsActive = false;
    btn.innerText = "📍 GPS: OFF";
    btn.classList.remove('active-btn');
    map.stopLocate();
    if (userMarker) map.removeLayer(userMarker);
    userMarker = null;
  }
}

map.on('locationfound', (e) => {
  const pos = e.latlng;
  if (!userMarker) {
    userMarker = L.marker(pos, {
      icon: L.divIcon({ className: 'user-pos', iconSize: [12, 12] })
    }).addTo(map);
  } else {
    userMarker.setLatLng(pos);
  }
  map.panTo(pos);
  updateLiveDistances(pos);
});

map.on('locationerror', () => {
  showToast("Error GPS: Activa tu ubicación");
  gpsActive = false;
  document.getElementById('gpsBtn').innerText = "📍 GPS: OFF";
});

// --- ROLES ---
function setUserRole(role) {
  currentRole = role;
  const label = document.getElementById('roleLabel');
  label.innerText = role === 'driver' ? "MODO: CONDUCTOR 🚗" : "MODO: PASAJERO 🚶";
  label.classList.add('active');
  
  document.getElementById('modeDriver').classList.toggle('active-btn', role === 'driver');
  document.getElementById('modeRider').classList.toggle('active-btn', role === 'rider');
  showToast(`Rol: ${role === 'driver' ? 'Conductor' : 'Pasajero'}`);
}

// --- RUTAS ---
async function setRoute(type) {
  if (routePoly) map.removeLayer(routePoly);
  const start = type === 'r1' ? PTA : PTB;
  const end = type === 'r1' ? PTB : PTA;
  const color = type === 'r1' ? '#00e5ff' : '#ff6b35';

  document.getElementById('btnR1').classList.toggle('active-btn', type === 'r1');
  document.getElementById('btnR2').classList.toggle('active-btn', type === 'r2');

  try {
    const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${start[1]},${start[1]};${end[1]},${end[0]}?overview=full&geometries=geojson`);
    // Nota: OSRM usa [lng, lat]
    const url = `https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`;
    const r = await fetch(url);
    const d = await r.json();
    const pts = d.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
    routePoly = L.polyline(pts, { color, weight: 6, opacity: 0.8 }).addTo(map);
    map.fitBounds(routePoly.getBounds(), { padding: [40, 40] });
    filterAlerts(type === 'r1' ? 'AB' : 'BA');
  } catch (e) { showToast("Error al trazar ruta"); }
}

function updateLiveDistances(pos) {
  const distA = map.distance(pos, PTA);
  const distB = map.distance(pos, PTB);
  document.getElementById('dA').innerText = distA > 1000 ? (distA/1000).toFixed(1)+"km" : Math.round(distA)+"m";
  document.getElementById('dB').innerText = distB > 1000 ? (distB/1000).toFixed(1)+"km" : Math.round(distB)+"m";
}

// --- ALERTAS ---
function startAlertMode() {
  alertActive = true;
  document.getElementById('alertOverlay').classList.add('show');
}

function setAlertDir(dir) {
  selectedDir = dir;
  document.getElementById('selAB').classList.toggle('active-btn', dir === 'AB');
  document.getElementById('selBA').classList.toggle('active-btn', dir === 'BA');
}

map.on('click', (e) => {
  if (!alertActive) return;
  if (!selectedDir) return showToast("Elige sentido primero");
  
  const marker = L.marker(e.latlng, {
    icon: L.divIcon({
      html: `<div style="background:${selectedDir==='AB'?'#facc15':'#f472b6'}; width:20px; height:20px; border-radius:50%; border:2px solid #000; box-shadow:0 0 10px #000"></div>`,
      className: ''
    })
  }).addTo(map);

  marker.bindPopup(`<button class="btn danger" onclick="deleteAlert(${alerts.length})">ELIMINAR</button>`);
  
  alerts.push({ lat: e.latlng.lat, lng: e.latlng.lng, dir: selectedDir, marker });
  updateUI();
  closeAlertMode();
  showToast("Reporte guardado");
});

function deleteAlert(idx) {
  map.removeLayer(alerts[idx].marker);
  alerts.splice(idx, 1);
  updateUI();
}

function filterAlerts(dir) {
  alerts.forEach(a => {
    if (a.dir === dir) a.marker.addTo(map);
    else map.removeLayer(a.marker);
  });
}

function updateUI() {
  document.getElementById('cAB').innerText = alerts.filter(a => a.dir === 'AB').length;
  document.getElementById('cBA').innerText = alerts.filter(a => a.dir === 'BA').length;
}

function closeAlertMode() {
  alertActive = false; selectedDir = null;
  document.getElementById('alertOverlay').classList.remove('show');
}

// --- SISTEMA ---
function showToast(m) {
  const t = document.getElementById('toast');
  t.innerText = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function openModal() { document.getElementById('modalOverlay').classList.add('show'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

function downloadAlerts() {
  const data = alerts.map(a => ({ lat: a.lat, lng: a.lng, dir: a.dir }));
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `alertas_scz_${Date.now()}.json`;
  a.click();
}

function importData(e) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    const data = JSON.parse(ev.target.result);
    data.forEach(d => {
      selectedDir = d.dir;
      map.fire('click', { latlng: L.latLng(d.lat, d.lng) });
    });
    closeModal();
    showToast("Datos importados");
  };
  reader.readAsText(e.target.files[0]);
}

function clearMap() {
  if (confirm("¿Borrar todas las alertas?")) {
    alerts.forEach(a => map.removeLayer(a.marker));
    alerts = [];
    updateUI();
    closeModal();
  }
}

// Iconos A y B
L.marker(PTA, { icon: L.divIcon({ html: '<div style="background:#00e5ff; color:#000; font-weight:800; padding:4px 8px; border-radius:10px; border:2px solid #000">A</div>', className:''}) }).addTo(map);
L.marker(PTB, { icon: L.divIcon({ html: '<div style="background:#ff6b35; color:#000; font-weight:800; padding:4px 8px; border-radius:10px; border:2px solid #000">B</div>', className:''}) }).addTo(map);

</script>
</body>
</html>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --r1:#00e5ff; --r2:#ff6b35; --au:#a78bfa;
    --bg:#0a0a12; --panel:#13131f; --border:#2a2a3e;
    --text:#e8e8f0; --muted:#6b6b8a;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family:'Space Mono', monospace; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  header { display:flex; flex-direction: column; padding: 10px; background:var(--panel); border-bottom:1px solid var(--border); z-index: 1001; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .logo { font-family:'Syne', sans-serif; font-size:0.85rem; font-weight:800; text-transform: uppercase; }
  
  .role-display { font-size: 0.65rem; padding: 4px 8px; border-radius: 6px; background: var(--border); color: var(--muted); }
  .role-display.active { border-color: var(--au); color: var(--au); font-weight: bold; border: 1px solid; }

  .controls { display:flex; gap:8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .controls::-webkit-scrollbar { display: none; }

  .btn { font-family:'Space Mono', monospace; font-size:0.7rem; font-weight:700; padding:10px 14px; border:1.5px solid var(--border); background:rgba(255,255,255,0.03); color:var(--muted); border-radius:10px; cursor:pointer; white-space:nowrap; }
  .btn.active-btn { border-color: var(--text); color: var(--text); background: rgba(255,255,255,0.1); }
  .btn.aau { border-color:var(--au); color:var(--au); }
  .btn.danger { border-color:#ef4444; color:#ef4444; }

  #map { flex:1; width:100%; z-index: 1; }

  .bottom-panel { position:absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; background:rgba(19, 19, 31, 0.95); backdrop-filter: blur(10px); border:1px solid var(--border); border-radius:16px; padding:15px; z-index:1000; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.7rem; margin-bottom: 12px; }
  .stat-item { display: flex; align-items: center; gap: 6px; }
  .dot { width:8px; height:8px; border-radius:50%; }

  .toast { position:fixed; bottom:150px; left:50%; transform:translateX(-50%); background:var(--r1); color:#000; padding:12px 24px; border-radius:12px; font-weight:bold; font-size:0.8rem; z-index:9999; opacity:0; transition:0.3s; pointer-events:none; text-align: center; }
  .toast.show { opacity:1; }

  .user-pos { width: 14px; height: 14px; background: var(--au); border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 15px var(--au); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.3); } 100% { transform: scale(1); } }
</style>
</head>
<body>

<header>
  <div class="top-bar">
    <div class="logo"><span style="color:#00e5ff">TRAPERO M</span> ↔ <span style="color:#ff6b35">MUTUALISTA</span></div>
    <div id="roleLabel" class="role-display">ESPERANDO ROL</div>
    <button class="btn aau" id="gpsBtn" onclick="toggleGPS()">📍 GPS: OFF</button>
  </div>
  <div class="controls">
    <button class="btn" id="modeDriver" onclick="setUserRole('driver')">🚗 CONDUCTOR</button>
    <button class="btn" id="modeRider" onclick="setUserRole('rider')">🚶 PASAJERO</button>
    <button class="btn" id="btnR1" onclick="setRoute('r1')">🔵 DESTINO: MUTUALISTA</button>
    <button class="btn" id="btnR2" onclick="setRoute('r2')">🟠 DESTINO: TRAPERO M</button>
  </div>
</header>

<div id="map"></div>

<div class="bottom-panel">
  <div class="stats-grid">
    <div class="stat-item"><div class="dot" style="background:#00e5ff"></div> Trapero: <b id="dA">-</b></div>
    <div class="stat-item"><div class="dot" style="background:#ff6b35"></div> Mutualista: <b id="dB">-</b></div>
    <div class="stat-item"><div class="dot" style="background:var(--au)"></div> 👋 Pasajeros: <b id="countUsers">0</b></div>
    <div class="stat-item"><div class="dot" style="background:#facc15"></div> Proximidad: <b id="distTarget">---</b></div>
  </div>
  <button class="btn danger" onclick="resetApp()" style="width:100%">🔄 FINALIZAR Y REINICIAR</button>
</div>

<div id="toast" class="toast"></div>

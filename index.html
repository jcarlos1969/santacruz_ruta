<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rutas A↔B SCZ - En Vivo</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --r1:#00e5ff; --r2:#ff6b35; --au:#a78bfa;
    --bg:#0a0a12; --panel:#13131f; --border:#2a2a3e;
    --text:#e8e8f0; --muted:#6b6b8a;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family:'Space Mono', monospace; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  header { display:flex; flex-direction: column; padding: 10px; background:var(--panel); border-bottom:1px solid var(--border); z-index: 1001; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .logo { font-family:'Syne', sans-serif; font-size:1rem; font-weight:800; }
  
  .role-display { font-size: 0.65rem; padding: 4px 8px; border-radius: 6px; background: var(--border); color: var(--muted); border: 1px solid transparent; }
  .role-display.active { border-color: var(--au); color: var(--au); font-weight: bold; }

  .controls { display:flex; gap:8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .controls::-webkit-scrollbar { display: none; }

  .btn { font-family:'Space Mono', monospace; font-size:0.7rem; font-weight:700; padding:10px 14px; border:1.5px solid var(--border); background:rgba(255,255,255,0.03); color:var(--muted); border-radius:10px; cursor:pointer; white-space:nowrap; }
  .btn.active-btn { border-color: var(--text); color: var(--text); background: rgba(255,255,255,0.1); }
  .btn.aau { border-color:var(--au); color:var(--au); }

  #map { flex:1; width:100%; z-index: 1; }

  .bottom-panel { position:absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; background:rgba(19, 19, 31, 0.95); backdrop-filter: blur(10px); border:1px solid var(--border); border-radius:16px; padding:15px; z-index:1000; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.75rem; margin-bottom: 12px; }
  .stat-item { display: flex; align-items: center; gap: 8px; }
  .dot { width:10px; height:10px; border-radius:50%; }

  .toast { position:fixed; bottom:140px; left:50%; transform:translateX(-50%); background:var(--r1); color:#000; padding:10px 20px; border-radius:12px; font-weight:bold; font-size:0.75rem; z-index:9999; opacity:0; transition:0.3s; pointer-events:none; }
  .toast.show { opacity:1; }

  .user-pos { width: 14px; height: 14px; background: var(--au); border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 15px var(--au); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.3); } 100% { transform: scale(1); } }
</style>
</head>
<body>

<header>
  <div class="top-bar">
    <div class="logo"><span style="color:#00e5ff">A</span>↔<span style="color:#ff6b35">B</span> SCZ</div>
    <div id="roleLabel" class="role-display">ELIGE ROL</div>
    <button class="btn aau" id="gpsBtn" onclick="toggleGPS()">📍 GPS: OFF</button>
  </div>
  <div class="controls">
    <button class="btn" id="modeDriver" onclick="setUserRole('driver')">🚗 CONDUCTOR</button>
    <button class="btn" id="modeRider" onclick="setUserRole('rider')">🚶 PASAJERO</button>
    <button class="btn" id="btnR1" onclick="setRoute('r1')">🔵 A→B</button>
    <button class="btn" id="btnR2" onclick="setRoute('r2')">🟠 B→A</button>
  </div>
</header>

<div id="map"></div>

<div class="bottom-panel">
  <div id="statusPassenger" style="display:none; text-align:center; margin-bottom:10px; font-size:0.8rem; color:var(--au); font-weight:bold;">
     👋 MANO LEVANTADA - LOS CONDUCTORES TE VEN
  </div>
  <div class="stats-grid">
    <div class="stat-item"><div class="dot" style="background:#00e5ff"></div> A: <b id="dA">-</b></div>
    <div class="stat-item"><div class="dot" style="background:#ff6b35"></div> B: <b id="dB">-</b></div>
    <div class="stat-item"><div class="dot" style="background:var(--au)"></div> 👋 Personas: <b id="countUsers">0</b></div>
    <div class="stat-item"><div class="dot" style="background:#facc15"></div> ⚠️ Alertas: <b id="cTotal">0</b></div>
  </div>
  <button class="btn aau" onclick="showToast('Función de alertas activa')" style="width:100%">REPORTAR INCIDENTE</button>
</div>

<div id="toast" class="toast"></div>

<script>
// --- TUS CREDENCIALES CONFIGURADAS ---
const firebaseConfig = {
  apiKey: "AIzaSyCWK5RIkqaW2OCHKKWs9MejIB-g96GCfj4",
  authDomain: "trufiapp.firebaseapp.com",
  databaseURL: "https://trufiapp-default-rtdb.firebaseio.com",
  projectId: "trufiapp",
  storageBucket: "trufiapp.firebasestorage.app",
  messagingSenderId: "1071494070293",
  appId: "1:1071494070293:web:b0093fea81f53332df0e1c"
};

// Inicialización de Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const userId = "user_" + Math.random().toString(36).substr(2, 9);

// --- LÓGICA DE MAPA ---
const PTA = [-17.7086389, -63.11375];
const PTB = [-17.762287,  -63.158758];
const map = L.map('map', { zoomControl: false }).setView([-17.735, -63.136], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let userMarker, gpsActive = false, currentRole = null;

function setUserRole(role) {
  currentRole = role;
  document.getElementById('roleLabel').innerText = role === 'driver' ? "CONDUCTOR 🚗" : "PASAJERO 🚶";
  document.getElementById('roleLabel').classList.add('active');
  document.querySelectorAll('.controls .btn').forEach(b => b.classList.remove('active-btn'));
  document.getElementById(role === 'driver' ? 'modeDriver' : 'modeRider').classList.add('active-btn');
  showToast("Modo seleccionado");
}

function toggleGPS() {
  const btn = document.getElementById('gpsBtn');
  const statusMsg = document.getElementById('statusPassenger');

  if (!gpsActive) {
    if (!currentRole) return showToast("Elige ROL primero");
    gpsActive = true;
    btn.innerText = "📍 GPS: ON";
    btn.classList.add('active-btn');
    map.locate({ watch: true, enableHighAccuracy: true });
    
    // ACCIÓN: LEVANTAR LA MANO EN FIREBASE
    if (currentRole === 'rider') {
      db.ref('pasajeros_activos/' + userId).set({ active: true, time: Date.now() });
      statusMsg.style.display = 'block';
    }
  } else {
    gpsActive = false;
    btn.innerText = "📍 GPS: OFF";
    btn.classList.remove('active-btn');
    map.stopLocate();
    if (userMarker) map.removeLayer(userMarker);
    userMarker = null;
    
    // ACCIÓN: BAJAR LA MANO
    db.ref('pasajeros_activos/' + userId).remove();
    statusMsg.style.display = 'none';
  }
}

// ESCUCHAR EN TIEMPO REAL: ¿Cuántos pasajeros hay?
db.ref('pasajeros_activos').on('value', (snapshot) => {
  const count = snapshot.numChildren();
  document.getElementById('countUsers').innerText = count;
});

map.on('locationfound', (e) => {
  if (!userMarker) {
    userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'user-pos', iconSize: [14, 14] }) }).addTo(map);
  } else {
    userMarker.setLatLng(e.latlng);
  }
  map.panTo(e.latlng);
  document.getElementById('dA').innerText = Math.round(map.distance(e.latlng, PTA)) + "m";
  document.getElementById('dB').innerText = Math.round(map.distance(e.latlng, PTB)) + "m";
});

function showToast(m) {
  const t = document.getElementById('toast');
  t.innerText = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Puntos iniciales
L.marker(PTA, { icon: L.divIcon({ html: '<div style="background:#00e5ff; color:#000; font-weight:800; padding:4px 8px; border-radius:10px; border:2px solid #000">A</div>', className:''}) }).addTo(map);
L.marker(PTB, { icon: L.divIcon({ html: '<div style="background:#ff6b35; color:#000; font-weight:800; padding:4px 8px; border-radius:10px; border:2px solid #000">B</div>', className:''}) }).addTo(map);

// Limpiar si el usuario cierra la app
window.addEventListener('beforeunload', () => { if(gpsActive) db.ref('pasajeros_activos/' + userId).remove(); });
</script>
</body>
</html>
